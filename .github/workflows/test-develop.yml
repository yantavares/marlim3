name: Test Python Package

on:
  push:
    branches:
      - develop

jobs:

  # ─────────────────────────────────────────────
  #  Test Python package with freshly compiled executable
  #  Builds executable, installs package, runs ALL tests
  # ─────────────────────────────────────────────
  test-python:
    name: Test Python Package (with compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ make

      - name: Build executable
        working-directory: src
        run: make all

      - name: Copy executable to package directory
        run: |
          mkdir -p marlim3
          cp src/Marlim3 marlim3/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=src
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=src

      - name: Install package (with compiled executable)
        env:
          MARLIM3_SKIP_BUILD: 1
        run: |
          pip install -e .

      - name: Run ALL tests (including simulation tests)
        run: |
          pytest -v --tb=short
