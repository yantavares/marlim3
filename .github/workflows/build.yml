name: Build Marlim3

on:
  push:
    tags:
      - 'v*'  # Dispara quando uma tag de versão é criada (ex: v1.0.0, v2.1.3)

jobs:

  # ─────────────────────────────────────────────
  #  Test Python package with freshly compiled executable
  #  Builds executable, installs package, runs ALL tests
  # ─────────────────────────────────────────────
  test-python:
    name: Test Python Package (with compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ make

      - name: Build executable
        working-directory: src
        run: make all

      - name: Copy executable to package directory
        run: |
          mkdir -p marlim3
          cp src/Marlim3 marlim3/

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=src
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=src

      - name: Install package (with compiled executable)
        env:
          MARLIM3_SKIP_BUILD: 1
        run: |
          pip install -e .

      - name: Run ALL tests (including simulation tests)
        run: |
          pytest -v --tb=short

  # ─────────────────────────────────────────────
  #  Linux  (manylinux2014 / CentOS 7 / glibc 2.17)
  #  Binário compatível com qualquer Linux glibc >= 2.17,
  #  incluindo ambientes HPC baseados em RHEL/CentOS 7.
  #
  #  Estratégia: o runner é ubuntu-latest (Node 20 funciona bem aqui).
  #  Apenas o step de compilação roda dentro do container manylinux2014
  #  via 'docker run', vinculando o workspace com -v.
  #  Isso evita o problema de Node 20 precisar de glibc >= 2.25 dentro
  #  do container CentOS 7 (glibc 2.17).
  # ─────────────────────────────────────────────
  build-linux:
    name: Build – Linux x64 (manylinux2014)
    runs-on: ubuntu-latest
    needs: test-python  # Only build if Python tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build (release) dentro do container manylinux2014
        # docker run monta o workspace e compila com GCC 10 (devtoolset-10).
        # O binário resultante exige apenas glibc >= 2.17.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              source /opt/rh/devtoolset-10/enable
              cd /workspace/src
              make release
            "

      - name: Verificar dependência de glibc
        # Deve exibir no máximo GLIBC_2.17 — confirma compatibilidade com o HPC.
        run: objdump -p src/Marlim3 | grep GLIBC || true

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Marlim3-linux-x64
          path: src/Marlim3

  # ─────────────────────────────────────────────
  #  Windows  (windows-latest, MSYS2/MinGW64)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build – Windows x64
    runs-on: windows-latest
    needs: test-python  # Only build if Python tests pass
    defaults:
      run:
        shell: msys2 {0}   # todos os steps usam o shell MSYS2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            make

      - name: Build (release)
        working-directory: src
        run: make release

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: Marlim3-windows-x64
          # MinGW adiciona .exe automaticamente mesmo que OUTPUT=Marlim3 no Makefile
          path: src/Marlim3.exe

  # ─────────────────────────────────────────────
  #  macOS  (Intel + Apple Silicon)
  # ─────────────────────────────────────────────
  build-macos:
    name: Build – macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: test-python  # Only build if Python tests pass
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
            artifact_name: Marlim3-macos-x64
          - runner: macos-14
            arch: arm64
            artifact_name: Marlim3-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          brew update
          brew install gcc make

      - name: Build (release)
        working-directory: src
        run: make release

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src/Marlim3

  # ─────────────────────────────────────────────
  #  Release  – Publicar binários na GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Criar Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - name: Baixar artefato Linux
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-linux-x64
          path: artifacts/linux

      - name: Baixar artefato Windows
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-windows-x64
          path: artifacts/windows

      - name: Baixar artefato macOS
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-macos-x64
          path: artifacts/macos-x64

      - name: Baixar artefato macOS (arm64)
        uses: actions/download-artifact@v4
        with:
          name: Marlim3-macos-arm64
          path: artifacts/macos-arm64

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux/Marlim3
            artifacts/windows/Marlim3.exe
            artifacts/macos-x64/Marlim3
            artifacts/macos-arm64/Marlim3
          draft: false
          prerelease: false
          generate_release_notes: true